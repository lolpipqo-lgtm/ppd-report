<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pensacola Police Department</title>

<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    background:#d9d9d9;
    font-family:'VT323', monospace;
    overflow-x:hidden;
    color:black;
}

/* slight old-screen blur */
body::after{
    content:"";
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(255,255,255,0.02);
    pointer-events:none;
}

/* HEADER */

.header{
    text-align:center;
    margin-top:40px;
}

.header h1{
    font-size:64px;
    font-weight:normal;
    margin:0;
    letter-spacing:2px;
}

.header p{
    font-size:32px;
    line-height:30px;
    margin-top:15px;
}

/* EVIDENCE BLOCKS */

.case{
    position:absolute;
    text-align:center;
}

.case img{
    width:300px;
    image-rendering:pixelated;
    filter:contrast(105%);
    transition:0.2s;
}

.case img:hover{
    filter:brightness(120%) blur(1px);
    transform:scale(1.01);
}

.label{
    font-size:38px;
    line-height:35px;
    margin-top:10px;
}

/* CASE POSITIONS */

.case1{
    top:280px;
    left:30px;
}

.case2{
    top:350px;
    right:80px;
}

.case3{
    top:700px;
    left:80px;
}

.case4{
    top:600px;
    left:500px;
}

.case5{
    top:930px;
    left:550px;
}

/* RANDOM TEXT */

.notes{
    position:absolute;
    top:980px;
    right:120px;
    font-size:42px;
    line-height:38px;
    width:300px;
}

/* POLAROID STYLE */

.polaroid{
    background:white;
    padding:10px 10px 50px 10px;
    box-shadow:0px 0px 8px rgba(0,0,0,0.2);
}

/* FAKE STATIC */

.static{
    animation:flicker 0.12s infinite;
}

@keyframes flicker{
    0%{opacity:1;}
    50%{opacity:0.98;}
    100%{opacity:1;}
}

/* MOBILE */

@media(max-width:900px){

    .header h1{
        font-size:42px;
    }

    .header p{
        font-size:24px;
    }

    .case{
        position:relative;
        top:auto !important;
        left:auto !important;
        right:auto !important;
        margin:40px auto;
        display:block;
    }

    .notes{
        position:relative;
        top:auto;
        right:auto;
        margin:40px auto;
        text-align:center;
    }

    body{
        padding-bottom:100px;
    }

}

</style>
</head>
<body class="static">

<div class="header">
    <h1>PENSACOLA POLICE DEPARTMENT</h1>
    <p>
        763 Lake Ridge Lane,<br>
        Pensacola, Florida
    </p>
</div>

<!-- CASE 1 -->

<div class="case case1">
    <div class="label">28 DECEASED</div>

    <img src="images/case1.jpg">

    <div class="label">
        IMG.MAY102016.jpeg
    </div>
</div>

<!-- CASE 2 -->

<div class="case case2">

    <div class="label">
        ROSE. W<br>
        FEMALE<br>
        34
    </div>

    <img src="images/case2.jpg">

    <div class="label">
        DECEASED<br>
        BURNS<br>
        CUTS
    </div>

</div>

<!-- CASE 3 -->

<div class="case case3">

    <img src="images/case3.jpg">

    <div class="label">
        JEFFY. W<br>
        MALE<br>
        12
    </div>

</div>

<!-- CASE 4 -->

<div class="case case4">

    <img src="images/case4.jpg">

</div>

<!-- CASE 5 -->

<div class="case case5">

    <div class="polaroid">
        <img src="images/suspect.jpg">
    </div>

</div>

<!-- NOTES -->

<div class="notes">
    SUSPECT<br>
    DOES BAD THINGS GUY<br>
    42
</div>

</body>
</html>
